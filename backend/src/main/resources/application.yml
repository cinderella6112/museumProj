server:
  port: 8080

spring:
  application:
    name: museum-recommend-backend

museum:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  agent:
    base-url: ${AGENT_BASE_URL:http://localhost:8000}
    connect-timeout-ms: 5000
    read-timeout-ms: 120000

logging:
  level:
    com.museum: INFO
